name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for setuptools-scm)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # setuptools-scm needs the full tag history

      # ── Python wheel ────────────────────────────────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # build tooling only; runtime is 3.14 in Docker

      - name: Install build tools
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Attach artifacts to release
        uses: https://gitea.com/actions/gitea-release-action@main
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker image ─────────────────────────────────────────────────────────

      - name: Log in to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: 192.168.2.134:3000
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract version from tag
        id: meta
        run: |
          RAW="${{ github.ref_name }}"          # e.g. v1.2.3 or v1.2.3-beta1
          VERSION="${RAW#v}"                    # strip leading 'v'
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # :latest only for stable releases (no hyphen suffix)
          if [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> $GITHUB_OUTPUT
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image (stable — version + latest)
        if: steps.meta.outputs.is_stable == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            192.168.2.134:3000/intipunku/frankenbote:${{ steps.meta.outputs.version }}
            192.168.2.134:3000/intipunku/frankenbote:latest

      - name: Build Docker image (pre-release — version tag only)
        if: steps.meta.outputs.is_stable == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            192.168.2.134:3000/intipunku/frankenbote:${{ steps.meta.outputs.version }}