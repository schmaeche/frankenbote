name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for setuptools-scm)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0          # setuptools-scm needs the full tag history
          token: ${{ secrets.WORKFLOW_ACTIONS }}  # for pushing changelog commits back to main

      # ── Python wheel ────────────────────────────────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"  # build tooling only; runtime is 3.14 in Docker

      - name: Install build tools
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Attach artifacts to release
        uses: https://gitea.com/actions/gitea-release-action@main
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # ── Changelog ───────────────────────────────────────────────────────────

      - name: Install git-cliff
        run: pip install git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          # Generate full CHANGELOG.md from all tags
          git cliff --output CHANGELOG.md

      - name: Commit CHANGELOG.md back to main
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.gitea"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(changelog): update for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

      # ── Docker image ─────────────────────────────────────────────────────────

      - name: Log in to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract version from tag
        id: meta
        run: |
          RAW="${{ github.ref_name }}"          # e.g. v1.2.3 or v1.2.3-beta1
          VERSION="${RAW#v}"                    # strip leading 'v'
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # :latest only for stable releases (no hyphen suffix)
          if [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> $GITHUB_OUTPUT
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image (stable — version + latest)
        if: steps.meta.outputs.is_stable == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_FRANKENBOTE=${{ steps.meta.outputs.version }}
          tags: |
            ${{ vars.REGISTRY_URL }}${{ vars.FRANKENBOTE_REPOSITORY }}:${{ steps.meta.outputs.version }} 
            ${{ vars.REGISTRY_URL }}${{ vars.FRANKENBOTE_REPOSITORY }}:latest

      - name: Build Docker image (pre-release — version tag only)
        if: steps.meta.outputs.is_stable == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_FRANKENBOTE=${{ steps.meta.outputs.version }}
          tags: |
            ${{ vars.REGISTRY_URL }}${{ vars.FRANKENBOTE_REPOSITORY }}:${{ steps.meta.outputs.version }}