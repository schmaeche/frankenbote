# Frankenbote source list.
#
# Each source needs:
#   id:       short identifier (lowercase, no spaces — used internally)
#   name:     human-readable display name
#   url:      the RSS/Atom feed URL (must be HTTPS unless allow_http: true)
#   category: one of: local, municipal, national, tabloid
#   enabled:  true/false — toggle without deleting (handy for debugging)
#
# Optional:
#   allow_http: true   — allow plain HTTP (only if no HTTPS option exists)
#   max_articles: 50   — cap how many articles to keep from this feed
#
# After editing this file, no rebuild is needed — just re-run `frankenbote fetch`.

sources:
  # ----- Local: Nuremberg metropolitan area -----
  # Note: Nordbayern offers separate feeds for different regions, RSS URLs end with "?isRss=true"
  - id: nordbayern_schlagzeilen
    name: "Nordbayern – Schlagzeilen"
    url: "https://www.nordbayern.de?isRss=true"
    category: local
    enabled: true

  - id: nordbayern_nuernberg
    name: "Nordbayern – Nürnberg"
    url: "https://www.nordbayern.de/nuernberg?isRss=true"
    category: local
    enabled: true

  - id: nordbayern_fuerth
    name: "Nordbayern – Fürth"
    url: "https://www.nordbayern.de/fuerth?isRss=true"
    category: local
    enabled: true

  - id: nordbayern_erlangen
    name: "Nordbayern – Erlangen"
    url: "https://www.nordbayern.de/erlangen?isRss=true"
    category: local
    enabled: true

  - id: nordbayern_franken
    name: "Nordbayern – Franken"
    url: "https://www.nordbayern.de/franken?isRss=true"
    category: local
    enabled: true

  - id: br24_mittelfranken
    name: "BR24 – Mittelfranken"
    url: "https://nachrichtenfeeds.br.de/rdf/boards/UZlNk5T"
    category: local
    enabled: true

  - id: br24_unterfranken
    name: "BR24 – Unterfranken"
    url: "https://nachrichtenfeeds.br.de/rdf/boards/UZlMw8z"
    category: local
    enabled: true

  - id: br24_oberfranken
    name: "BR24 – Oberfranken"
    url: "https://nachrichtenfeeds.br.de/rdf/boards/UZlNKwl"
    category: local
    enabled: true

  # ----- Municipal: Stadt Nürnberg -----
  - id: nuernberg_aktuell
    name: "Stadt Nürnberg – Aktuelle Nachrichten"
    url: "https://go.nuernberg.de/62603295"
    category: municipal
    enabled: false

  - id: nuernberg_autoverkehr
    name: "Stadt Nürnberg – Autoverkehr"
    url: "https://www.nuernberg.de/internet/newsfeed/stadtportal_autoverkehr.xml"
    category: municipal
    enabled: false

  - id: nuernberg_buergerservice
    name: "Stadt Nürnberg – Bürgerservice"
    url: "https://www.nuernberg.de/internet/newsfeed/stadtportal_buergerservice.xml"
    category: municipal
    enabled: false

  # ----- National: quality press & broadcasters -----
  - id: tagesschau
    name: "Tagesschau"
    url: "https://www.tagesschau.de/index~rss2.xml"
    category: national
    enabled: true

  - id: spiegel
    name: "Spiegel – Schlagzeilen"
    url: "https://www.spiegel.de/schlagzeilen/index.rss"
    category: national
    enabled: true

  - id: zeit
    name: "Zeit Online"
    url: "https://newsfeed.zeit.de/index"
    category: national
    enabled: true

  - id: sueddeutsche_politik
    name: "Süddeutsche – Politik"
    url: "https://rss.sueddeutsche.de/rss/Politik"
